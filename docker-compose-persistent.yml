services:
  db:
    image: postgres:17.7
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:      
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/pg_notify.sql
      - ./src/main/resources/data.sql:/docker-entrypoint-initdb.d/q-data.sql
      # - ./db-data:/var/lib/postgresql/data use for saving locally (remove it as admin)
      - simple-shop-api_data:/var/lib/postgresql/data # Remove with docker compose down -v

    networks:
      - backend_network

# Remove if using local saving
volumes:
  simple-shop-api_data:

networks:
  backend_network:
    driver: bridge